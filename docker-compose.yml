version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: watchdog-backend
    restart: always
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./dataset:/app/dataset
    networks:
      - watchdog-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: watchdog-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - watchdog-network

networks:
  watchdog-network:
    driver: bridge

volumes:
  data:
  dataset:
